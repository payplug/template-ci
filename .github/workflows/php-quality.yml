name: PHP — Quality

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to run quality checks on'
        type: string
        default: '8.4'

jobs:
  quality:
    name: Quality (PHP ${{ inputs.php-version }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ inputs.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: PHPStan
        run: composer stan

      - name: PHP-CS-Fixer (dry-run)
        run: composer lint
