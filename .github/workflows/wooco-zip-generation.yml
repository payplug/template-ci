name: WooCommerce — Zip Generation

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use for Composer'
        type: string
        default: '7.2'
      node-version:
        description: 'Node.js version to use for asset compilation'
        type: string
        default: '20'
      ref:
        description: 'Branch ref or SHA to check out (defaults to the triggering commit)'
        type: string
        default: ''
      env:
        description: 'Target environment (QA or prod)'
        type: string
        default: 'QA'
    secrets:
      payplug-domain:
        description: 'Value injected into PAYPLUG_DOMAIN in assets/js/payplug-domain.js (QA only; omit for prod)'
        required: false
      cdn-payplug:
        description: 'Value injected into IP_API in payplug-config.php'
        required: true
      api-payplug:
        description: 'API domain injected into vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php'
        required: true
      api-payplug-retail:
        description: 'Retail API domain injected into vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php'
        required: true

jobs:
  build-zip:
    name: Build ${{ inputs.env }} zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      # ── PHP ────────────────────────────────────────────────────────────────
      - name: Set up PHP ${{ inputs.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies (no dev, optimised autoloader)
        run: composer install --prefer-dist --no-dev --no-scripts -o

      # ── Node / assets ──────────────────────────────────────────────────────
      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install npm dependencies
        run: npm ci

      - name: Generate UI assets from payplug-ui-plugins-bo
        run: |
          VERSION=$(node -p "require('./package.json').version")
          rm -rf ./assets/dist
          mkdir -p ./assets/dist/js ./assets/dist/css ./assets/dist/img
          cp ./node_modules/payplug-ui-plugins-bo/js/app.js           ./assets/dist/js/app-${VERSION}.js
          cp ./node_modules/payplug-ui-plugins-bo/js/chunk-vendors.js ./assets/dist/js/chunk-vendors-${VERSION}.js
          cp ./node_modules/payplug-ui-plugins-bo/css/app.css         ./assets/dist/css/app-${VERSION}.css
          cp ./node_modules/payplug-ui-plugins-bo/img/*               ./assets/dist/img/

      - name: Compile SCSS assets
        run: npm run build:css

      # ── Environment injection ──────────────────────────────────────────────
      # All changes are intentionally NOT committed — they only exist in
      # the zip artifact so that secrets never land in the repository.

      - name: Inject environment values
        env:
          TARGET_ENV:     ${{ inputs.env }}
          PAYPLUG_DOMAIN: ${{ secrets.payplug-domain }}
          CDN_PAYPLUG:    ${{ secrets.cdn-payplug }}
          API_PAYPLUG:    ${{ secrets.api-payplug }}
          API_PAYPLUG_RETAIL:    ${{ secrets.api-payplug-retail }}
        run: |
          python3 << 'PYEOF'
          import os, re

          target_env     = os.environ['TARGET_ENV']
          payplug_domain = os.environ['PAYPLUG_DOMAIN']
          cdn_payplug    = os.environ['CDN_PAYPLUG']
          api_payplug    = os.environ['API_PAYPLUG']
          api_payplug_retail    = os.environ['API_PAYPLUG_RETAIL']

          # assets/js/payplug-domain.js
          # QA:   replace PAYPLUG_DOMAIN value with the secret
          # prod: delete the line entirely
          with open('assets/js/payplug-domain.js', 'r') as f:
              content = f.read()
          if target_env == 'QA':
              content = re.sub(
                  r'const PAYPLUG_DOMAIN = "[^"]*"',
                  f'const PAYPLUG_DOMAIN = "{payplug_domain}"',
                  content
              )
          else:
              content = re.sub(r'[^\n]*const PAYPLUG_DOMAIN = "[^"]*"[^\n]*\n?', '', content)
          with open('assets/js/payplug-domain.js', 'w') as f:
              f.write(content)

          # payplug-config.php — set IP_API constant
          with open('payplug-config.php', 'r') as f:
              content = f.read()
          content = re.sub(
              r"define\('IP_API',\s*'[^']*'\)",
              f"define('IP_API', '{cdn_payplug}')",
              content
          )
          with open('payplug-config.php', 'w') as f:
              f.write(content)

          # vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php — set API domain
          routes_path = 'vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php'
          with open(routes_path, 'r') as f:
              content = f.read()
          content = content.replace('https://api.payplug.com', api_payplug)
          content = content.replace('https://retail.service.payplug.com', api_payplug_retail)
          with open(routes_path, 'w') as f:
              f.write(content)
          PYEOF

      # ── Artifact ───────────────────────────────────────────────────────────
      # We stage the plugin files into a directory instead of creating a zip.
      # actions/upload-artifact wraps whatever it receives in a zip — so uploading
      # a pre-made zip would give a zip-of-a-zip. Uploading a directory gives a
      # single zip with the right payplug-woocommerce/ structure, directly
      # installable via the WordPress admin "Upload Plugin" screen.

      - name: Extract plugin version
        id: meta
        run: |
          VERSION=$(grep -oP "define\('PAYPLUG_GATEWAY_VERSION',\s*'\K[^']+" payplug.php)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Stage plugin files
        run: |
          STAGING="/tmp/staging/payplug-woocommerce"
          mkdir -p "$STAGING"

          # Build rsync exclude list from .distignore.
          # vendor is explicitly kept: it is required at runtime.
          EXCLUDES=()
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            [[ "$line" == "vendor" ]] && continue
            EXCLUDES+=("--exclude=${line}")
          done < .distignore
          # Exclude SCSS sources — compiled CSS is already included
          EXCLUDES+=("--exclude=assets/scss*")

          rsync -a "${EXCLUDES[@]}" . "$STAGING/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: payplug-woocommerce-${{ steps.meta.outputs.version }}-${{ inputs.env }}
          path: /tmp/staging/
          retention-days: 7
