name: JS — Quality

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to run quality checks on'
        type: string
        default: '20'
      js-folder:
        description: 'Path to the JS folder to lint'
        type: string
        default: '.'

jobs:
  quality:
    name: Quality (Node ${{ inputs.node-version }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: ESLint — syntax & style check
        run: npx eslint ${{ inputs.js-folder }} --ext .js --max-warnings=0
