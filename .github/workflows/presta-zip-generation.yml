name: PrestaShop — Zip Generation

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use for Composer'
        type: string
        default: '7.4'
      node-version:
        description: 'Node.js version to use for asset compilation'
        type: string
        default: '16'
      ref:
        description: 'Branch ref or SHA to check out (defaults to the triggering commit)'
        type: string
        default: ''
      env:
        description: 'Target environment (QA or prod)'
        type: string
        default: 'QA'
      base-ref:
        description: 'Base branch ref used for translation generation'
        type: string
        default: ''
    secrets:
      api-payplug:
        description: 'API domain injected into vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php'
        required: true
      api-payplug-retail:
        description: 'Retail API domain injected into vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php'
        required: true
      github-token:
        description: 'Token used to attach the zip to a GitHub Release (required for prod only)'
        required: false

jobs:
  build-zip:
    name: Build ${{ inputs.env }} zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # ── PHP ────────────────────────────────────────────────────────────────
      - name: Set up PHP ${{ inputs.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2
          coverage: none

      # ── Node / assets ──────────────────────────────────────────────────────
      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install npm dependencies
        run: npm ci

      - name: Generate translations
        run: php dev/ci/generate-translations.php ${{ inputs.base-ref }}

      - name: Build assets
        run: |
          chmod +x ./dev/ci/generate-asset-files.sh && ./dev/ci/generate-asset-files.sh
          npm install --save-dev webpack
          npm run build

      - name: Install Composer dependencies (no dev)
        run: composer install --prefer-dist --no-dev --no-scripts -o

      # ── Environment injection ──────────────────────────────────────────────
      # Changes only exist in the zip artifact — secrets never land in the repo.

      - name: Inject environment values into APIRoutes.php
        env:
          API_PAYPLUG:        ${{ secrets.api-payplug }}
          API_PAYPLUG_RETAIL: ${{ secrets.api-payplug-retail }}
        run: |
          python3 << 'PYEOF'
          import os

          api_payplug        = os.environ['API_PAYPLUG']
          api_payplug_retail = os.environ['API_PAYPLUG_RETAIL']

          routes_path = 'vendor/payplug/payplug-php/lib/Payplug/Core/APIRoutes.php'
          with open(routes_path, 'r') as f:
              content = f.read()
          content = content.replace('https://api.payplug.com', api_payplug)
          content = content.replace('https://retail.service.payplug.com', api_payplug_retail)
          with open(routes_path, 'w') as f:
              f.write(content)
          PYEOF

      # ── Package build ──────────────────────────────────────────────────────
      - name: Build the package
        run: |
          echo "Set license headers"
          ./dev/ci/set_licenses.sh -b payplug

          echo "Update copyright years"
          ./dev/ci/update_year.sh

          echo "Add index.php files to directories"
          ./dev/ci/secure_directories.sh

          echo "Create empty log files for installation"
          echo "" > log/install-log.csv

          echo "Creating the package zip file"
          php dev/ci/list_module_files.php .

          echo "Remove unnecessary files"
          rm -rf node_modules dev tests

      # ── Artifact ───────────────────────────────────────────────────────────
      # We stage the plugin files into a payplug/ directory.
      # actions/upload-artifact wraps the directory into a zip, giving a
      # single zip with the right payplug/ structure directly installable
      # via the PrestaShop back office.

      - name: Extract plugin version
        id: meta
        run: |
          VERSION=$(jq -r '.version' composer.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Stage plugin files
        run: |
          STAGING="/tmp/staging/payplug"
          mkdir -p "$STAGING"
          find . -maxdepth 1 ! -name '.' ! -name '.git' -exec mv {} "$STAGING/" \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: payplug_${{ steps.meta.outputs.version }}-${{ inputs.env }}
          path: /tmp/staging/
          retention-days: 7
      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload ${{ github.ref_name }} payplug.zip --clobber --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.github-token }}

