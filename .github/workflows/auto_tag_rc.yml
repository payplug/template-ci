name: Sylius — Auto-tag RC0

on:
    workflow_call:
        secrets:
            RELEASE_TOKEN:
                required: true

jobs:
    create-rc0-tag:
        name: Create RC0 tag
        runs-on: ubuntu-latest
        steps:
            -
                uses: actions/checkout@v4
                with:
                    token: ${{ secrets.RELEASE_TOKEN }}
            -
                name: Create and push RC0 tag
                run: |
                    VERSION="${GITHUB_REF#refs/heads/release/}"
                    git tag "${VERSION}-rc0"
                    git push origin "${VERSION}-rc0"
