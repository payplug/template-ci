name: PHP — Package

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to build with'
        type: string
        default: '8.4'
      zip-prefix:
        description: 'Prefix for the ZIP filename (e.g. "my-lib-php72")'
        type: string
        required: true

jobs:
  package:
    name: Package artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ inputs.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Run release (Rector downgrade + generate composer.json)
        run: composer release

      - name: Create ZIP
        run: |
          ZIP_NAME="${{ inputs.zip-prefix }}-dev-${GITHUB_SHA::8}.zip"
          zip -r "$ZIP_NAME" payplug-core/
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
